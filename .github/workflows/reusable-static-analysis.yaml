name: "Reusable Static Analysis"

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        default: "."
        type: string
    secrets:
      GH_PAT:
        required: false 

permissions:
  contents: read
  id-token: none
  actions: none
  checks: none

jobs:
  validate:
    name: "Tfctl Doctor & Security"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        # We need tfctl to run 'doctor'
        # We need checkov for security scans
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          pip install --upgrade pip
          pip install checkov
          pip install "git+https://${GH_TOKEN}@github.com/BT-IT-Infrastructure-CloudOps/tfctl.git@main"
          # awsctl is required by tfctl doctor dependency checks
          pip install "git+https://${GH_TOKEN}@github.com/BT-IT-Infrastructure-CloudOps/awsctl.git@main"

      - name: Run Tfctl Doctor
        # This runs 'terraform validate' and 'terraform fmt' safely
        working-directory: ${{ inputs.working-directory }}
        run: tfctl doctor