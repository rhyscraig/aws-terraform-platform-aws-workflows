name: "Reusable Release & Changelog"

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Secure Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Calculate SemVer from conventional commits
        id: semver
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LAST_TAG"

          VERSION=${LAST_TAG#v}
          IFS='.' read -ra ADDR <<< "$VERSION"
          MAJOR=${ADDR[0]:-0}
          MINOR=${ADDR[1]:-0}
          PATCH=${ADDR[2]:-0}

          # Analyse commits since last tag for conventional commit types.
          # Breaking change (BREAKING CHANGE footer or ! suffix) → major bump.
          # feat: → minor bump.
          # fix:/chore:/docs:/refactor:/perf:/test:/ci: → patch bump.
          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s%n%b" 2>/dev/null || git log --pretty=format:"%s%n%b")

          BUMP="patch"
          while IFS= read -r line; do
            if echo "$line" | grep -qiE "BREAKING CHANGE|^[a-z]+(\(.+\))?!:"; then
              BUMP="major"
              break
            elif echo "$line" | grep -qiE "^feat(\(.+\))?:"; then
              BUMP="minor"
            fi
          done <<< "$COMMITS"

          echo "Bump type: $BUMP"

          case "$BUMP" in
            major) NEW_TAG="v$((MAJOR + 1)).0.0" ;;
            minor) NEW_TAG="v${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.semver.outputs.new_tag }}"
          git push origin "${{ steps.semver.outputs.new_tag }}"

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v0.1.15
        with:
          tag_name: ${{ steps.semver.outputs.new_tag }}
          generate_release_notes: true
          token: ${{ secrets.GH_TOKEN }}
