name: "Reusable Drift Detection"

on:
  workflow_call:
    inputs:
      env_name:
        required: true
        type: string
      aws_region:
        required: false
        default: "us-east-1"
        type: string
    secrets:
      OIDC_ROLE_ARN:
        required: true
      GH_PAT:
        required: true

jobs:
  drift-check:
    name: Detect Drift
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write # To alert on drift

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Set up Python & Tools
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install tfctl
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          pip install "git+https://${GH_TOKEN}@github.com/BT-IT-Infrastructure-CloudOps/tfctl.git@main"

      - name: Check for Drift
        env:
          CI: "true"
        run: |
          # tfctl plan returns 0 for no changes, 2 for changes (drift), 1 for error
          set +e
          tfctl --env=${{ inputs.env_name }} plan -detailed-exitcode
          EXIT_CODE=$?
          set -e
          
          if [ $EXIT_CODE -eq 2 ]; then
            echo "::error::DRIFT DETECTED! Infrastructure does not match Code."
            exit 1
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Plan failed execution."
            exit 1
          fi
          echo "✅ No drift detected."