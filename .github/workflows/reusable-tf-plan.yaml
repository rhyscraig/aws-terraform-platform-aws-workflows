name: "Reusable TFCTL Plan"

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      GH_PAT:
        required: true
      AWS_ROLE_ARN:
        required: true
    outputs:
      plan_sha256:
        description: "SHA256 digest of the plan artifact for SLSA provenance"
        value: ${{ jobs.plan.outputs.plan_sha256 }}

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      plan_sha256: ${{ steps.sha.outputs.plan_sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@d4695650384537945e0b565ee73a714d361bcb04 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Setup Tools (Python/TF)
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Install Tfctl
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          pip install --upgrade pip
          pip install "git+https://${GH_TOKEN}@github.com/rhyscraig/tfctl.git@v2.2.0"

      - name: Run TFCTL Plan
        working-directory: ${{ inputs.working-directory }}
        # TFCTL handles init, workspace selection, and plan generation
        run: tfctl plan --out tfplan.binary

      - name: Compute Plan SHA256
        id: sha
        working-directory: ${{ inputs.working-directory }}
        run: echo "plan_sha256=$(sha256sum tfplan.binary | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working-directory }}/tfplan.binary
          retention-days: 1
