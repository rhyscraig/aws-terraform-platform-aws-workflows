name: Workflow Validation

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/**'

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Actionlint
        # Static analysis for GitHub Actions (catches syntax errors, deprecated fields, etc.)
        uses: reviewdog/action-actionlint@v1
        with:
          fail_on_error: true
          # We disable shellcheck for embedded run scripts as they are often templated
          actionlint_flags: "-ignore 'SC2086'"