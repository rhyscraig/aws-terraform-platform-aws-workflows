name: "Reusable Terraform Destroy"

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Path to the terraform directory"
        required: true
        type: string
      aws-region:
        description: "AWS Region"
        required: false
        default: "us-east-1"
        type: string
      tfctl-version:
        description: "Tag of tfctl to use"
        required: false
        default: "v2.2.0"
        type: string
      environment:
        description: "Github Environment Name (Controls Approval Gates)"
        required: true
        type: string
    secrets:
      OIDC_ROLE_ARN:
        description: "AWS IAM Role ARN"
        required: true
      GH_PAT:
        description: "Personal Access Token"
        required: true

jobs:
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    # This environment keyword triggers GitHub's Manual Approval protection rules
    # CRITICAL: Always use an environment with manual approvals for destroy
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
      actions: none
      checks: none
      

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Tools
        # We need tfctl to run 'doctor'
        # We need checkov for security scans
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          pip install --upgrade pip
          pip install checkov
          pip install "git+https://${GH_TOKEN}@github.com/BT-IT-Infrastructure-CloudOps/tfctl.git@main"
          # awsctl is required by tfctl doctor dependency checks
          pip install "git+https://${GH_TOKEN}@github.com/BT-IT-Infrastructure-CloudOps/awsctl.git@main"

      - name: Run Tfctl Doctor
        # This runs 'terraform validate' and 'terraform fmt' safely
        working-directory: ${{ inputs.working-directory }}
        run: tfctl doctor

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: "GitHubActions-Destroy-${{ github.run_id }}"

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: tfctl init

      - name: Terraform Destroy
        working-directory: ${{ inputs.working-directory }}
        # tfctl destroy has built-in guardrails (confirmation prompts).
        # In CI, we need to ensure it runs non-interactively if intended,
        # OR fails if manual confirmation is required.
        # For CI automation, we usually pass -auto-approve which tfctl likely handles via args.
        # We rely on GitHub Environment Protection rules for the "human check".
        run: tfctl destroy