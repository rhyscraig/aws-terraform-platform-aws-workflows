name: Release Workflows

on:
  push:
    branches: [ main ]
    paths:
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 1. Calculate the Next Version (SemVer)
      - name: Bump Version
        id: tag
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          # "feat:" -> minor, "fix:" -> patch, "BREAKING CHANGE:" -> major
          DEFAULT_BUMP: patch
          DRY_RUN: false

      # 2. Create Formal GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          generate_release_notes: true
          draft: false
          prerelease: false