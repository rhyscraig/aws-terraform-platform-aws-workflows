name: "Reusable Python CI"

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.11"
      working-directory:
        required: false
        type: string
        default: "."

permissions:
  contents: read
  id-token: none
  actions: none
  checks: none

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Install Dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy bandit types-requests types-PyYAML
          if [ -f pyproject.toml ]; then pip install .[dev]; fi

      - name: Check Formatting (Black)
        working-directory: ${{ inputs.working-directory }}
        run: black --check src tests

      - name: Linting (Ruff)
        working-directory: ${{ inputs.working-directory }}
        run: ruff check src tests

      - name: Type Checking (MyPy)
        working-directory: ${{ inputs.working-directory }}
        run: mypy src --strict

      - name: Security Scan (Bandit)
        working-directory: ${{ inputs.working-directory }}
        # Exclude tests from security scan as they often use asserts/mocks
        run: bandit -r src -ll

      - name: Run Tests
        working-directory: ${{ inputs.working-directory }}
        run: pytest -v --cov=src --cov-report=xml --cov-fail-under=85